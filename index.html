<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPO Insights | IIT Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative">

    <header class="bg-blue-900 text-white shadow-md py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">SPO Insights Dashboard</h1>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 flex flex-col md:flex-row gap-8">
        
        <aside class="w-full md:w-1/4 bg-white p-6 rounded-lg shadow-sm border border-gray-200 h-fit">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">Filters</h2>
            
            <div class="mb-4">
                <input type="text" id="searchInput" placeholder="Search names or companies..." class="w-full p-2 border rounded-md text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4">
                <h3 class="font-semibold text-sm text-gray-600 mb-2">Year</h3>
                <select id="yearFilter" class="w-full p-2 border rounded-md text-sm outline-none">
                    <option value="All">All Years</option>
                    </select>
            </div>

            <div class="mb-4">
                <h3 class="font-semibold text-sm text-gray-600 mb-2">Branch</h3>
                <select id="branchFilter" class="w-full p-2 border rounded-md text-sm outline-none">
                    <option value="All">All Branches</option>
                    </select>
            </div>
            
            <button onclick="applyFilters()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md font-medium transition mt-4">Apply Filters</button>
        </aside>

        <section class="w-full md:w-3/4 flex flex-col gap-6">
            <div id="studentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
    </main>

    <div id="insight-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 border-b border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <h3 class="text-2xl font-bold text-gray-900" id="modal-name">Student Name</h3>
                            <p class="text-sm text-gray-500 mt-1" id="modal-subtitle">Company • Role • Branch Year</p>
                        </div>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="bg-gray-50 px-4 py-5 sm:p-6 max-h-[60vh] overflow-y-auto">
                    <div class="mb-6">
                        <h4 class="text-lg font-bold text-gray-800 mb-2 border-l-4 border-blue-600 pl-2">Study Strategy</h4>
                        <p id="modal-strategy" class="text-gray-600 text-sm leading-relaxed"></p>
                    </div>
                    <div class="mb-6">
                        <h4 class="text-lg font-bold text-gray-800 mb-2 border-l-4 border-green-500 pl-2">Interview Experience</h4>
                        <p id="modal-experience" class="text-gray-600 text-sm leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let globalData = []; // Store all CSV rows here

        // 1. Fetch and Parse the CSV on load
      // Updated Frontend Logic to use Live Google Sheet
window.addEventListener('DOMContentLoaded', () => {
    // This is your specific Sheet ID converted to a CSV export link
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1Ts093imRI9-rgHe69CkBbquNuT7snRivoIvxF6i-5RY/gviz/tq?tqx=out:csv";

    Papa.parse(sheetUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            globalData = results.data;
            populateDropdowns();
            renderGrid(globalData);
        },
        error: function(error) {
            console.error("Error loading Live Sheet:", error);
            document.getElementById('studentGrid').innerHTML = `
                <div class="col-span-full text-center p-10 bg-red-50 text-red-600 rounded-lg">
                    <p class="font-bold">Live Data Error</p>
                    <p class="text-sm">Make sure your Google Sheet is set to "Publish to Web" as a CSV.</p>
                </div>`;
        }
    });
});

        // 2. Dynamically extract unique years and branches for the filters
        function populateDropdowns() {
            const years = [...new Set(globalData.map(item => item.year))].sort().reverse();
            const branches = [...new Set(globalData.map(item => item.branch))].sort();

            const yearSelect = document.getElementById('yearFilter');
            const branchSelect = document.getElementById('branchFilter');

            years.forEach(year => yearSelect.add(new Option(year, year)));
            branches.forEach(branch => branchSelect.add(new Option(branch, branch)));
        }

        // 3. Render the HTML cards based on the array passed in
        function renderGrid(dataToRender) {
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = ''; // Clear current

            if(dataToRender.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500 mt-10">No students match your filters.</p>`;
                return;
            }

            dataToRender.forEach(student => {
                const card = `
                    <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition flex flex-col h-full">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg">${student.name}</h3>
                            <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-semibold">${student.year}</span>
                        </div>
                        <p class="text-sm text-gray-600 mb-1">Placed at <span class="font-bold text-gray-900">${student.company}</span></p>
                        <p class="text-xs text-gray-500 mb-4">${student.role} • ${student.branch}</p>
                        
                        <p class="text-sm text-gray-600 line-clamp-2 mb-4 italic flex-grow">
                            "${student.study_strategy}"
                        </p>

                        <button onclick="openModal(${student.id})" class="w-full py-2 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-blue-600 font-medium rounded-md transition text-sm mt-auto">
                            Read Full Experience
                        </button>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // 4. Handle Filtering
        function applyFilters() {
            const searchStr = document.getElementById('searchInput').value.toLowerCase();
            const yearStr = document.getElementById('yearFilter').value;
            const branchStr = document.getElementById('branchFilter').value;

            const filteredData = globalData.filter(student => {
                const matchesSearch = student.name.toLowerCase().includes(searchStr) || student.company.toLowerCase().includes(searchStr);
                const matchesYear = yearStr === 'All' || student.year === yearStr;
                const matchesBranch = branchStr === 'All' || student.branch === branchStr;
                return matchesSearch && matchesYear && matchesBranch;
            });

            renderGrid(filteredData);
        }

        // 5. Modal Management
        function openModal(id) {
            // Find the specific student data
            const student = globalData.find(s => parseInt(s.id) === id);
            if(!student) return;

            // Populate Modal DOM elements
            document.getElementById('modal-name').innerText = student.name;
            document.getElementById('modal-subtitle').innerText = `${student.company} • ${student.role} • ${student.branch} ${student.year}`;
            document.getElementById('modal-strategy').innerText = student.study_strategy;
            document.getElementById('modal-experience').innerText = student.interview_experience;

            // Show Modal
            document.getElementById('insight-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('insight-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
