<!DOCTYPE html>
<html>

<head>

<title>Inter Hall Sports Points Table</title>

<style>

body{
background:#0f172a;
font-family:Arial, sans-serif;
color:white;
text-align:center;
}

h1{
margin-top:30px;
font-size:40px;
letter-spacing:2px;
color:#38bdf8;
}

h2{
color:#94a3b8;
margin-bottom:30px;
}

table{

margin:auto;
border-collapse:collapse;
width:85%;
background:#020617;
border-radius:10px;
overflow:hidden;
box-shadow:0px 0px 20px rgba(0,0,0,0.6);

}

th{

background:#1e293b;
padding:14px;
font-size:18px;
text-transform:uppercase;
letter-spacing:1px;

}

td{

padding:12px;
font-size:16px;

}

tr:nth-child(even){
background:#020617;
}

tr:nth-child(odd){
background:#071226;
}

tr:hover{

background:#0ea5e9;
color:black;
transition:.3s;

}

td:first-child{

font-weight:bold;
color:#38bdf8;

}

td:nth-child(2){

text-align:left;
padding-left:25px;

}

tfoot{

background:#22c55e;
font-weight:bold;
font-size:18px;
color:black;

}

</style>

</head>

<body>

<h1>🏆 Inter Hall Sports Championship</h1>

<h2>Live Points Table</h2>

<table id="sheetTable"></table>

<script>

fetch("https://docs.google.com/spreadsheets/d/1_FmdxZjA9FjDSDal7EgqwoXsap2chzQZQLgxcIA75qM/export?format=csv")

.then(res=>res.text())

.then(data=>{

let rows=data.split("\n");

let table=document.getElementById("sheetTable");

rows.forEach((row,index)=>{

let tr=document.createElement("tr");

let cols=row.split(",");

cols.forEach(col=>{

let cell;

if(index==0)
cell=document.createElement("th");
else
cell=document.createElement("td");

cell.innerText=col;

tr.appendChild(cell);

});

table.appendChild(tr);

});

});

</script>

</body>

</html>
